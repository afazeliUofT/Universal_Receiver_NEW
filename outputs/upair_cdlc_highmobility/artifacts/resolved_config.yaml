experiment:
  name: upair_cdlc_highmobility
  output_root: outputs
system:
  seed: 7
  precision: single
  batch_size_train: 32
  batch_size_eval: 64
  ebno_db_train_min: 0.0
  ebno_db_train_max: 16.0
  ebno_db_eval:
  - 0
  - 2
  - 4
  - 6
  - 8
  - 10
  - 12
  - 14
  - 16
pusch:
  carrier_frequency_hz: 3.5e9
  subcarrier_spacing_khz: 30
  n_size_grid: 16
  n_size_bwp: 16
  cyclic_prefix: normal
  mapping_type: A
  symbol_allocation:
  - 0
  - 14
  num_layers: 1
  num_antenna_ports: 1
  precoding: non-codebook
  transform_precoding: false
  mcs_index: 10
  mcs_table: qam64
  dmrs:
    config_type: 1
    length: 1
    additional_position: 0
    type_a_position: 2
    num_cdm_groups_without_data: 2
channel:
  model: C
  delay_spread_s: 3.0e-07
  min_speed_mps: 22.22
  max_speed_mps: 38.89
  num_rx_ant: 4
  num_tx_ant: 1
  normalize_channel: true
impairments:
  enabled: true
  train:
    cpe_sigma_rad: 0.03
    slope_range_rad:
    - -0.2
    - 0.2
    rw_sigma_rad: 0.015
  eval:
    cpe_sigma_rad: 0.04
    slope_rad: 0.16
    rw_sigma_rad: 0.02
model:
  d_model: 96
  num_blocks: 4
  num_heads: 4
  mlp_ratio: 2.0
  dropout: 0.05
  residual_scale: 0.35
  use_noise_feature: true
  use_pilot_mask_feature: true
training:
  steps: 3000
  val_steps: 64
  log_every: 100
  eval_every: 250
  learning_rate: 0.0003
  weight_decay: 1.0e-05
  nmse_loss_weight: 0.1
  grad_clip_norm: 1.0
  checkpoint_name: best.weights.h5
evaluation:
  num_batches_per_point: 120
  save_example_batch: true
